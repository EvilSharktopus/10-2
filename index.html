<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Social Studies 10-2 — Self-Paced Learning Workbook" />
    <title>Social Studies 10-2 Workbook</title>
    <script>
      window.addEventListener('error', function(event) {
        var msg = event.message || (event.error && event.error.message) || 'Unknown Script Error';
        showFatalError(msg);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var msg = (event.reason && event.reason.message) ? event.reason.message : 'Unhandled Promise Rejection';
        showFatalError(msg);
      });
      function showFatalError(msg) {
        var errDiv = document.getElementById('fatal-error-overlay');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'fatal-error-overlay';
          errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#fff;display:flex;align-items:center;justify-content:center;z-index:99999;padding:2rem;box-sizing:border-box;font-family:system-ui, sans-serif;';
          document.body.appendChild(errDiv);
        }
        errDiv.innerHTML = '<div style="background:#1a1a1a;padding:2rem;border-radius:12px;border:1px solid #ef4444;max-width:600px;width:100%;"><h2 style="color:#ef4444;margin-top:0;">Failed to Load Error</h2><p style="color:#d1d5db;line-height:1.5;">The application encountered a critical error and could not load. If you recently deployed to Vercel, ensure you have completed a <strong>Redeploy</strong> after adding Environment Variables.</p><div style="background:#000;padding:1rem;border-radius:6px;font-family:monospace;color:#fca5a5;white-space:pre-wrap;word-break:break-word;margin:1rem 0;">' + msg + '</div><p style="color:#9ca3af;font-size:0.9rem;margin-bottom:0;">Check your browser developer console for more details.</p></div>';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
